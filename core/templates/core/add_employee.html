<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Add Employee</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; padding: 40px; }
    h1 { font-size: 24px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
    input { width: 100%; max-width: 400px; padding: 10px;
            border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .btn { background: #007bff; color: white; border: none;
           padding: 10px 24px; border-radius: 4px; font-size: 14px; cursor: pointer; }
    .btn:hover { background: #0056b3; }
    .back { color: #007bff; text-decoration: none;
            font-size: 14px; display: inline-block; margin-bottom: 20px; }
  </style>
</head>
<body>
  <a class="back" href="{% url 'employee_list' %}">← Retour</a>
  <h1>Add Employee</h1>
  <form method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label>{{ field.label }}</label>
      {{ field }}
    </div>
    {% endfor %}
    <button type="submit" class="btn">Save</button>
  </form>
</body>
</html>
